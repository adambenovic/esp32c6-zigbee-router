name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Merge binaries into single flashable .bin
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd build
          esptool.py --chip esp32c6 merge_bin \
            -o firmware-merged.bin \
            --flash_mode dio \
            --flash_size 4MB \
            @flash_args

      - name: Upload firmware artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/firmware-merged.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Publish firmware to GitHub Pages docs/
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp firmware-merged.bin docs/firmware-merged.bin
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" docs/manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/firmware-merged.bin docs/manifest.json
          git diff --cached --quiet || git commit -m "chore: update firmware to $VERSION for web flasher [skip ci]"
          git push origin master

      - name: Attach firmware to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-merged.bin
